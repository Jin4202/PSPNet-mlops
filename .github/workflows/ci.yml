name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check ."

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -v

  validation-gate:
    runs-on: ubuntu-latest
    needs: [test]
    # No MLflow server is reachable from CI yet, so the steps below are a
    # no-op until MLFLOW_TRACKING_URI is configured as a repo secret. Once
    # it is, this becomes a hard gate: docker-build only runs if it passes.
    # (job-level `if` can't reference `secrets`, so the check is per-step.)
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    steps:
      - if: env.MLFLOW_TRACKING_URI != ''
        uses: actions/checkout@v4
      - if: env.MLFLOW_TRACKING_URI != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - if: env.MLFLOW_TRACKING_URI != ''
        name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements-dev.txt
      - if: env.MLFLOW_TRACKING_URI != ''
        name: Check validation gate
        env:
          MODEL_STAGE_OR_VERSION: ${{ vars.MODEL_STAGE_OR_VERSION }}
        run: python scripts/check_validation_gate.py

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test, validation-gate]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      (needs.validation-gate.result == 'success' || needs.validation-gate.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - name: Build serving image
        run: docker build -t pspnet-serving:${{ github.sha }} .

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/pspnet-serving:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: pspnet-serving
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: ${{ env.IMAGE }}
          flags: --allow-unauthenticated
