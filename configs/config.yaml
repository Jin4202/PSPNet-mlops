data:
  dataset_path: "data/camvid/"
  train_list: "dataset_lists/camvid-11/list/train.txt"
  val_list:   "dataset_lists/camvid-11/list/val.txt"
  num_classes: 11
  ignore_label: 255

augmentation:
  short_size: 240
  crop_size: 201
  scale_min: 0.5
  scale_max: 2.0
  rotate_min: -10
  rotate_max: 10
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]

model:
  arch: "pspnet"
  num_classes: 11
  zoom_factor: 8
  ppm_bins: [1, 2, 3, 6]
  ppm_dim: 512

training:
  epochs: 100
  batch_size: 8
  num_workers: 4
  device: "cuda"
  base_lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  aux_weight: 0.4
  poly_power: 0.9
  save_dir: "checkpoints/"
  save_freq: 5

evaluation:
  miou_threshold: 0.40

mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "pspnet-camvid"
  run_name: "baseline-v1"
  model_name: "pspnet-camvid"
